name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Static validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run static validation
        run: python3 scripts/validate_nexa.py
      - name: Check minified dist files are up to date
        run: python3 scripts/minify.py --check

  browser-tests:
    name: Browser tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Playwright
        run: |
          pip install playwright==1.61.0
          playwright install --with-deps ${{ matrix.browser }}
      - name: Run engine test suite
        run: python3 scripts/run_browser_tests.py --browser ${{ matrix.browser }}
