name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Static validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run static validation
        run: python3 scripts/validate_nexa.py
      - name: Check minified dist files are up to date
        run: python3 scripts/minify.py --check

  browser-tests:
    name: Browser tests (headless Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium
      - name: Run engine test suite
        run: python3 scripts/run_browser_tests.py
